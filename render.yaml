databases:
  - name: frank-media-db
    plan: free
    databaseName: frank_media
    user: frank_media_user

services:
  - type: web
    name: frank-media-api
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PAYMENT_MODE
        value: mock
      - key: DATABASE_URL
        fromDatabase:
          name: frank-media-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: APP_URL
        value: https://frank-media-web.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://frank-media-web.onrender.com

  - type: static
    name: frank-media-web
    env: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://frank-media-api.onrender.com
